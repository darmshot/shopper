name: Deploy to Test

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Select environment to deploy"
        required: true
        type: choice
        options:
          - test1

jobs:
  deploy_test:
    runs-on: ubuntu-latest

    steps:
      - name: Short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      # ---------------------------------------------------------
      # Parse TEST_BINDS and extract host/user/path/secret-name
      # ---------------------------------------------------------
      - name: Resolve deployment target
        id: resolve
        run: |
          target="${{ github.event.inputs.target }}"
          binds=$(echo "${{ vars.TEST_BINDS }}" | tr -d '\r')

          echo "Selected target: $target"
          found="false"

          while read -r name host user path secret_name; do
            if [[ "$name" == "$target" ]]; then
              echo "Match found: $name"
              echo "Host: $host"
              echo "User: $user"
              echo "Path: $path"
              echo "Secret name: $secret_name"
              echo "SSH_HOST=$host" >> $GITHUB_ENV
              echo "SSH_USER=$user" >> $GITHUB_ENV
              echo "DEPLOY_PATH=$path" >> $GITHUB_ENV
              echo "SSH_SECRET_NAME=$secret_name" >> $GITHUB_ENV
              found="true"
              break
            fi
          done <<< "$binds"

          if [[ "$found" != "true" ]]; then
            echo "ERROR: Target '$target' not found in TEST_BINDS"
            exit 1
          fi

      # ---------------------------------------------------------
      # Deploy using the selected server's SSH key
      # ---------------------------------------------------------
      - uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.SSH_HOST }}
          username: ${{ env.SSH_USER }}
          key: ${{ secrets[env.SSH_SECRET_NAME] }}
          script: |
            set -ex
            docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}
            docker pull ghcr.io/${{ github.repository }}:sha-${{ env.SHORT_SHA }}

            cd ${{ env.DEPLOY_PATH }}

            IMAGE_TAG=sha-${{ env.SHORT_SHA }} docker compose -f production.compose.yaml up -d --force-recreate

            docker system prune -f
