name: Deploy to Develop

on:
  push:
    branches:
      - 'dev/**'

jobs:
  dev-deploy:
    runs-on: ubuntu-latest
    steps:
      # ---------------------------------------------------------
      # Parse DEVELOP_BINDS and extract host/user/secret_name/branch_pattern/path
      # ---------------------------------------------------------
      - name: Resolve deployment target
        id: resolve
        run: |
          branch="${{ github.ref_name }}"
          binds=$(echo "${{ vars.DEVELOP_BINDS }}" | tr -d '\r')

          echo "Current branch: $branch"
          found="false"

          while read -r host user secret_name branch_pattern path; do
            # Skip empty/comment lines
            if [[ -z "$branch_pattern" || "$branch_pattern" == "#"* ]]; then
              continue
            fi

            echo "Checking branch_pattern '$branch_pattern' against branch '$branch'"

            # Wildcard match
            if [[ "$branch_pattern" == *"*"* ]]; then
              prefix="${branch_pattern%'*'}"
              if [[ "$branch" == "$prefix"* ]]; then
                echo "Match found via wildcard: $branch_pattern"
                found="true"
              fi
            # Exact match
            elif [[ "$branch_pattern" == "$branch" ]]; then
              echo "Exact match found: $branch_pattern"
              found="true"
            fi

            if [[ "$found" == "true" ]]; then
              echo "SSH_HOST=$host" >> $GITHUB_ENV
              echo "SSH_USER=$user" >> $GITHUB_ENV
              echo "SSH_SECRET_NAME=$secret_name" >> $GITHUB_ENV
              echo "DEPLOY_PATH=$path" >> $GITHUB_ENV

              break
            fi
          done <<< "$binds"

          if [[ "$found" != "true" ]]; then
            echo "ERROR: No matching bind found for branch '$branch'"
            exit 1
          fi

      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy and run post-deployment script
        uses: easingthemes/ssh-deploy@v4.1.10
        with:
          SSH_PRIVATE_KEY: ${{ secrets[env.SSH_SECRET_NAME] }}
          ARGS: "-avzr --delete"
          SOURCE: "./"
          REMOTE_HOST: ${{ env.SSH_HOST }}
          REMOTE_USER: ${{ env.SSH_USER }}
          TARGET: ${{ env.DEPLOY_PATH }}
          EXCLUDE: "/.git/, /.github/, .env, /vendor/"
