name: Build App

on:
  workflow_dispatch:
  pull_request:
    branches:
      - master
      - release/*

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  tests:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: test_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v4

      # ---------------------------------------------------------
      # Login to GHCR
      # ---------------------------------------------------------
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ---------------------------------------------------------
      # Pull your PHP base image
      # ---------------------------------------------------------
      - name: Pull PHP base image
        run: |
          docker pull ghcr.io/${{ github.repository_owner }}/shopper-php85-base:latest

      # ---------------------------------------------------------
      # Run PHPUnit & Pint tests inside the container
      # ---------------------------------------------------------

      - name: Run unit & pint tests
        run: |
          docker run --rm \
          --add-host=host.docker.internal:host-gateway \
          --user 1001:121 \
          -v ${{ github.workspace }}:/var/www/html \
          -e APP_KEY=base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA= \
          -e DB_CONNECTION=mysql \
          -e DB_HOST=host.docker.internal \
          -e DB_PORT=3306 \
          -e DB_DATABASE=test_db \
          -e DB_USERNAME=root \
          -e DB_PASSWORD=root \
          -w /var/www/html \
          ghcr.io/${{ github.repository_owner }}/shopper-php85-base:latest \
          sh -c "
          composer install --no-interaction --prefer-dist &&

          echo 'Running Pint...' &&
          vendor/bin/pint --test &&

          echo 'Running PHPStan...' &&
          vendor/bin/phpstan analyse --no-progress &&

          echo 'Running Rector...' &&
          vendor/bin/rector process --dry-run &&

          echo 'Running PHPUnit...' &&
          vendor/bin/pest --testdox
          "

  build_app:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
      # ---------------------------------------------------------
      # Login to GHCR
      # ---------------------------------------------------------
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ---------------------------------------------------------
      # Extract REAL PR SHA (not GitHub merge SHA)
      # ---------------------------------------------------------
      - name: Extract short SHA
        id: sha
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            REAL_SHA="${{ github.event.pull_request.head.sha }}"
          else
            REAL_SHA="${GITHUB_SHA}"
          fi

          SHORT_SHA=$(echo "$REAL_SHA" | cut -c1-7)

          echo "REAL_SHA=$REAL_SHA" >> $GITHUB_OUTPUT
          echo "SHORT_SHA=$SHORT_SHA" >> $GITHUB_OUTPUT

      # ---------------------------------------------------------
      # Docker Metadata (using REAL PR SHA)
      # ---------------------------------------------------------
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=sha-${{ steps.sha.outputs.SHORT_SHA }}
            type=raw,value=latest

      # ---------------------------------------------------------
      # Build & Push Docker Image
      # ---------------------------------------------------------
      - uses: docker/build-push-action@v5
        id: build
        with:
          context: .
          file: ./docker/app/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # ---------------------------------------------------------
      # Runtime Octane Boot Test
      # ---------------------------------------------------------
      - name: Test Octane boots successfully
        run: |
          TAG="sha-${{ steps.sha.outputs.SHORT_SHA }}"
          echo "Testing image: $TAG"

          docker run -d --rm --name octane_test \
            -p 8000:8000 \
            -e APP_KEY=base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA= \
            -e APP_ENV=testing \
            -e APP_DEBUG=false \
            -e LOG_CHANNEL=stderr \
            -e CACHE_DRIVER=array \
            -e SESSION_DRIVER=array \
            -e QUEUE_CONNECTION=sync \
            -e DB_CONNECTION=sqlite \
            -e DB_DATABASE=:memory: \
            ghcr.io/${{ github.repository }}:$TAG

          sleep 5

          curl -f http://localhost:8000/up || (docker logs octane_test && exit 1)

          docker stop octane_test

      # ---------------------------------------------------------
      # Git Tag (only on master)
      # ---------------------------------------------------------
      - name: Create Git tag for this build
        if: github.ref == 'refs/heads/master'
        run: |
          TAG="sha-${{ steps.sha.outputs.SHORT_SHA }}"
          git tag $TAG ${{ steps.sha.outputs.REAL_SHA }}
          git push origin $TAG
