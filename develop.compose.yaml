services:
    app:
        build:
            context: 'docker/php84'
            dockerfile: Dockerfile
            args:
                WWWGROUP: '${WWWGROUP:-1000}'
                WWWUSER: '${WWWUSER:-1000}'
        image: 'shopper/php84'
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        ports:
            - '127.0.0.1:${APP_PORT:-80}:8000'
        volumes:
            - '.:/var/www/html'
        networks:
            - shopper
        command: sh -c "${DEVELOP_PHP_COMMAND}"
        depends_on:
            mysql:
                condition: service_healthy
            redis:
                condition: service_healthy
    cli:
        build:
            context: 'docker/php84'
            dockerfile: Dockerfile
            args:
                WWWGROUP: '${WWWGROUP:-1000}'
                WWWUSER: '${WWWUSER:-1000}'
        image: 'shopper/php84'
        networks:
            - shopper
        volumes:
            - '.:/var/www/html'
        profiles:
            - cli
        depends_on:
            mysql:
                condition: service_healthy
            redis:
                condition: service_healthy
    mysql:
        image: 'percona/percona-server:8.0'
        ports:
            - '${FORWARD_DB_PORT:-3306}:3306'
        environment:
            MYSQL_ROOT_PASSWORD: '${DB_PASSWORD}'
            MYSQL_ROOT_HOST: '%'
            MYSQL_DATABASE: '${DB_DATABASE}'
            MYSQL_USER: '${DB_USERNAME}'
            MYSQL_PASSWORD: '${DB_PASSWORD}'
            MYSQL_ALLOW_EMPTY_PASSWORD: 1
            MYSQL_EXTRA_OPTIONS: '${MYSQL_EXTRA_OPTIONS:-}'
        volumes:
            - 'shopper-mysql:/var/lib/mysql'
            - './docker/mysql/create-testing-database.sh:/docker-entrypoint-initdb.d/10-create-testing-database.sh'
        networks:
            - shopper
        healthcheck:
            test: [ "CMD", "mysqladmin", "ping", "-p${DB_PASSWORD}" ]
            retries: 3
            timeout: 5s

    redis:
        image: 'redis:alpine'
        volumes:
            - 'shopper-redis:/data'
        networks:
            - shopper
        healthcheck:
            test: [ "CMD", "redis-cli", "ping" ]
            retries: 3
            timeout: 5s

networks:
    shopper:
        driver: bridge

volumes:
    shopper-mysql:
    shopper-redis:
